# Mosquitto config for the tesboard fleet-telemetry stack.
listener 1883

# allow_anonymous is safe here ONLY because this broker publishes NO port to the host
# (see docker-compose.yml: mosquitto has no `ports:`). It is reachable solely on the
# internal compose network = loopback-equivalent. Do not publish 1883.
allow_anonymous true

# Optional defense-in-depth hardening: disable anonymous and require a password.
# 1) allow_anonymous false
# 2) password_file /mosquitto/config/passwd   (create with `mosquitto_passwd -c passwd <user>`)
# Then set the same username/password in the fleet-telemetry `mqtt` block (config.json)
# and in the adapter env (MQTT_USERNAME / MQTT_PASSWORD).
